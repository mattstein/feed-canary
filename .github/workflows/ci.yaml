name: ci
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
jobs:
  phpstan:
    name: PHPStan + Pint
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: pdo_pgsql
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-ansi --no-progress
      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=2G
      - name: Run Pint
        run: ./vendor/bin/pint --test
  test:
    name: Pest Tests
    needs: phpstan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laravel
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laravel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Prepare PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: pdo_pgsql
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-ansi --no-progress
      - name: Copy .env
        run: cp .github/.env.ci .env
      - name: Generate key
        run: php artisan key:generate
      - name: Run migrations
        run: php artisan migrate
      - name: Run tests
        run: |
          php artisan test | tee /tmp/test-output.txt
          exit ${PIPESTATUS[0]}
      - name: Summarize test results
        if: success()
        run: |
          echo "## Tests passed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^  Tests:|^  Duration:" /tmp/test-output.txt | sed 's/^  //' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
