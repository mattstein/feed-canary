# Worker stack: scheduler and Horizon.
#
# The web tier (Octane / FrankenPHP) is intentionally NOT here—it’s deployed as
# a standalone Coolify “Application” resource built from .docker/octane/Dockerfile
# so it gets health-gated rolling (zero-downtime) deploys, which Coolify does not
# perform for docker-compose resources. These workers don’t need zero-downtime.
#
# MySQL and Redis are managed separately as Coolify resources; these services
# reach them over Coolify’s predefined network.
services:
  scheduler:
    build:
      context: .
      dockerfile: ./.docker/cli/Dockerfile
    command: [ "php", "artisan", "schedule:work" ]
    volumes:
      - ./storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'artisan schedule:work' | grep -v grep || exit 1"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 10s
  horizon:
    build:
      context: .
      dockerfile: ./.docker/web/Dockerfile
    environment:
      PHP_FPM_POOL_NAME: "feed-canary_horizon"
    command: [ "php", "artisan", "horizon" ]
    volumes:
      - ./storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'artisan horizon' | grep -v grep || exit 1"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 10s
